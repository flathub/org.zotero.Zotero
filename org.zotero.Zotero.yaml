id: org.zotero.Zotero
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: zotero
rename-desktop-file: zotero.desktop
finish-args:
  - --device=dri
  - --env=MOZ_APP_REMOTINGNAME=org.zotero.Zotero
  - --persist=.zotero
  - --persist=Zotero
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --own-name=org.mozilla.zotero.*
  # below file permission can be removed with minimal impact on usability,
  # we keep these permissions to preserve the functionality of the unsandboxed version
  # See: https://github.com/flathub/org.zotero.Zotero/issues/82
  # and the app description for details.
  - --filesystem=home
  - --filesystem=xdg-run/speech-dispatcher:ro
cleanup:
  - /share/zotero/${FLATPAK_ID}.appdata.xml
  - /share/zotero/policies.json
modules:
  - name: dotconf
    cleanup:
      - '*'
    sources:
      - type: archive
        url: https://github.com/williamh/dotconf/archive/refs/tags/v1.4.1.tar.gz
        sha256: 5922c46cacf99b2ecc4853d28a2bda4a489292e73276e604bd9cba29dfca892d
        x-checker-data:
          type: json
          url: https://api.github.com/repos/williamh/dotconf/tags
          version-query: .[0].name | ltrimstr("v")
          url-query: '"https://github.com/williamh/dotconf/archive/refs/tags/" + .[0].name
            + ".tar.gz"'
      - type: script
        commands:
          - autoreconf -fiv
        dest-filename: autogen.sh
  - name: libspeechd
    config-opts:
      - --disable-python
      - --with-systemdsystemunitdir=
      - --disable-rpath
      - --disable-static
      - --with-kali=no
      - --with-baratinoo=no
      - --with-ibmtts=no
      - --with-voxin=no
      - --without-oss
    sources:
      - type: archive
        url: https://github.com/brailcom/speechd/releases/download/0.12.1/speech-dispatcher-0.12.1.tar.gz
        sha256: b14a5238d287d2dcce4dd42bbd66ca65fa228e7e683708267f7b34036f7ba4b4
        x-checker-data:
          type: json
          url: https://api.github.com/repos/brailcom/speechd/releases/latest
          version-query: .tag_name | ltrimstr("v")
          url-query: '"https://github.com/brailcom/speechd/releases/download/" + .tag_name
            + "/speech-dispatcher-" + (.tag_name | ltrimstr("v")) + ".tar.gz"'
    cleanup:
      - /bin
      - /etc
      - /libexec
      - /lib/speech-dispatcher
      - /share/sounds/speech-dispatcher
      - /share/speech-dispatcher
  - shared-modules/dbus-glib/dbus-glib.json
  - name: zotero
    buildsystem: simple
    sources:
      - type: archive
        url: https://download.zotero.org/client/release/9.0/Zotero-9.0_linux-x86_64.tar.xz
        sha512: f0d014d107bb38d6508415546f877e99826736c645b33301d0006b9113fbe4dea27ec76de1c2f9b5dfd9ede01f9ee0df5a7564562a859fc41c11d30a9d969d12
        only-arches:
          - x86_64
        x-checker-data:
          type: rotating-url
          url: https://www.zotero.org/download/client/dl?channel=release&platform=linux-x86_64
          pattern: https://download.zotero.org/client/release/([0-9.]+)/Zotero-([0-9.]+)_linux-x86_64.tar.xz
      - type: archive
        url: https://download.zotero.org/client/release/9.0/Zotero-9.0_linux-arm64.tar.xz
        sha512: 3781d7ea861c4809df3b85d0d05f0e8055eff564500a7d14285f40ce2594e46c3b020cb39f0ec75d0aa74b5dc95b189ad5d64d7274c23dff460742e537f6aa36
        only-arches:
          - aarch64
        x-checker-data:
          type: rotating-url
          url: https://www.zotero.org/download/client/dl?channel=release&platform=linux-arm64
          pattern: https://download.zotero.org/client/release/([0-9.]+)/Zotero-([0-9.]+)_linux-arm64.tar.xz
      - type: file
        path: org.zotero.Zotero.appdata.xml
      - type: file
        path: policies.json
      # extracted from https://github.com/zotero/zotero/blob/main/app/mac/Contents/Resources/zotero.icns
      - type: file
        path: 256x256.png
      - type: file
        path: 512x512.png
    build-commands:
      - mkdir -p /app/{bin,share}
      - cp -R . /app/share/zotero
      - install -D icons/icon32.png /app/share/icons/hicolor/32x32/apps/${FLATPAK_ID}.png
      - install -D icons/icon64.png /app/share/icons/hicolor/64x64/apps/${FLATPAK_ID}.png
      - install -D icons/icon128.png /app/share/icons/hicolor/128x128/apps/${FLATPAK_ID}.png
      - install -D 256x256.png /app/share/icons/hicolor/256x256/apps/${FLATPAK_ID}.png
      - install -D 512x512.png /app/share/icons/hicolor/512x512/apps/${FLATPAK_ID}.png
      # - install -D icons/symbolic.svg /app/share/icons/hicolor/symbolic/apps/${FLATPAK_ID}.svg
      - >-
        desktop-file-install
        --dir=/app/share/applications
        --set-key=Categories --set-value='Office;Science'
        --set-key=Keywords --set-value='bibliography;biblatex;bibtex;citing;literature'
        --set-key=Exec --set-value='zotero -url %U'
        --set-key=Icon --set-value=${FLATPAK_ID}
        --add-mime-type=x-scheme-handler/zotero
        zotero.desktop
      - install -D ${FLATPAK_ID}.appdata.xml /app/share/appdata/${FLATPAK_ID}.appdata.xml
      - ln -s /app/share/zotero/zotero /app/bin/zotero
      # disable auto-updates
      # https://support.mozilla.org/en-US/kb/customizing-firefox-using-policiesjson
      # https://mozilla.github.io/policy-templates/#disableappupdate
      - mkdir -p /app/share/zotero/distribution
      - install -D policies.json /app/share/zotero/distribution/policies.json
